<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Galeria Scrollable</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            background-color: #FFFFFF; 
            color: #000000; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 14px; 
            margin: 0; 
            padding: 0; 
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        /* CONTENIDOR PRINCIPAL */
        .contenidor-principal {
            width: 100%;
            max-height: 100%; 
            overflow-x: auto; 
            overflow-y: hidden; 
            padding-bottom: 0px; /* Deixat a zero perquè el marge de la graella faci la feina */
            display: flex;
            align-items: center;
        }
        
        /* LA GRAELLA: En línia contínua */
        .grelha-enllacos { 
            display: flex;
            flex-direction: row;  
            flex-wrap: nowrap;     
            gap: 36px; 
            padding-left: 25px;
            padding-right: 25px;
            margin: 0 auto; 
            margin-bottom: 32px; /* Marge ajustat a 32px per a la barra de 24px */
        }
        
        /* CADA ELEMENT INDIVIDUAL (PC a 320px) */
        .item-enllac { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 320px;          
            flex-shrink: 0; 
            box-sizing: border-box;
        }
        
        .item-enllac img { 
            width: 100%; 
            height: 320px;         
            object-fit: cover; 
            border: none; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: transform 0.2s ease;
        }

        .item-enllac img:hover {
            transform: scale(1.03); 
        }
        
        .item-enllac a { 
            color: #000000; 
            text-decoration: none; 
            line-height: 1.4; 
            word-wrap: break-word;
            width: 100%;
            font-weight: 500;
        }
        
        .item-enllac a:hover { 
            text-decoration: underline; 
        }

        /* BARRA D'SCROLL AJUSTADA A 24px */
        .contenidor-principal::-webkit-scrollbar {
            height: 24px; /* El nou gruix elegant */
        }
        .contenidor-principal::-webkit-scrollbar-track {
            background: #f5f5f5; 
            border-radius: 12px;
        }
        .contenidor-principal::-webkit-scrollbar-thumb {
            background: #b5b5b5; 
            border-radius: 12px;
            border: 4px solid #f5f5f5; /* Mantenim el contorn buit per estilitzar-la */
        }
        .contenidor-principal::-webkit-scrollbar-thumb:hover {
            background: #888888; 
        }

        /* DISSENY OPTIMITZAT PER A MÒBILS (Es manté intacte) */
        @media (max-width: 600px) {
            html, body {
                align-items: flex-start; 
                padding-top: 5px;
                font-size: 11px;
            }
            .grelha-enllacos {
                gap: 14px;
                margin: 0; 
                margin-bottom: 0px; /* Al mòbil no necessitem el marge del PC */
            }
            .item-enllac { 
                width: 108px;          
            }
            .item-enllac img { 
                height: 108px;         
                margin-bottom: 8px;
            }
            .item-enllac a {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="contenidor-principal">
        <div class="grelha-enllacos" id="contenidorEnllacos">Carregant projectes...</div>
    </div>

    <script>
        // =========================================================================
        //  PEGA AQUÍ EL TEU ENLLAÇ CSV DEL GOOGLE SHEETS
        // =========================================================================
        const URL_CSV_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRw8f4wmgIUeI9A5893zHJXTr7zrZMWNRFKW6ydFbKnuax2gL5QbOs9_S_iyJ07zC-7FqvLYQn1nIuT/pub?gid=468442670&single=true&output=csv";
        
        const BASE_URL_DRIVE = "https://lh3.googleusercontent.com/d/";
        const contenidor = document.getElementById('contenidorEnllacos');

        let urlPaginaActual = "";
        try { urlPaginaActual = decodeURIComponent(document.referrer).toLowerCase(); } catch(e) { urlPaginaActual = document.referrer.toLowerCase(); }

        fetch(URL_CSV_SHEETS)
            .then(response => response.text())
            .then(text => {
                const llines = text.split("\n");
                contenidor.innerHTML = "";
                
                for (let i = 1; i < llines.length; i++) {
                    if (!llines[i].trim()) continue;
                    const columnes = llines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columnes[0] && columnes[2]) {
                        const txt = columnes[0].replace(/"/g, "").trim();
                        const url = columnes[1] ? columnes[1].replace(/"/g, "").trim() : "";
                        const idDrive = columnes[2].replace(/"/g, "").trim();

                        if (url && urlPaginaActual.includes(url.toLowerCase().trim())) continue;

                        const divItem = document.createElement('div');
                        divItem.className = 'item-enllac';

                        const aImg = document.createElement('a');
                        aImg.href = url;
                        aImg.target = "_blank";
                        aImg.rel = "noopener noreferrer";
                        const img = document.createElement('img');
                        img.src = BASE_URL_DRIVE + idDrive;
                        aImg.appendChild(img);

                        const aTxt = document.createElement('a');
                        aTxt.href = url;
                        aTxt.target = "_blank";
                        aTxt.rel = "noopener noreferrer";
                        aTxt.textContent = txt;

                        divItem.appendChild(aImg);
                        divItem.appendChild(aTxt);
                        contenidor.appendChild(divItem);
                    }
                }
            })
            .catch(err => { contenidor.innerHTML = "Error de connexió."; });
    </script>
</body>
</html>
