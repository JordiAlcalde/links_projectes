<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Galeria Scrollable</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            background-color: #FFFFFF; 
            color: #000000; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 11px; 
            margin: 0; 
            padding: 5px; 
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; /* Evitem qualsevol scroll a la finestra exterior */
        }

        /* CONTENIDOR PRINCIPAL: Limita l'alçada i activa l'scroll HORITZONTAL */
        .contenidor-principal {
            width: 100%;
            height: 100%;
            overflow-x: auto; /* Activa l'scroll lateral si els elements surten per la dreta */
            overflow-y: hidden; /* Bloqueja el moviment vertical */
            padding-bottom: 5px;
            display: flex;
            align-items: center; /* Centra els elements verticalment */
        }
        
        /* LA GRAELLA: Ara es converteix en una línia contínua sense salts */
        .grelha-enllacos { 
            display: flex;
            flex-direction: row;  /* Força a col·locar-se un al costat de l'altre */
            flex-wrap: nowrap;     /* PROHIBEIX saltar de línia cap avall */
            gap: 20px;             
            padding-left: 10px;
            padding-right: 20px;
        }
        
        /* CADA ELEMENT INDIVIDUAL (Mida fixa idèntica per a tot arreu) */
        .item-enllac { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 125px;          
            flex-shrink: 0; /* CRUCIAL: Evita que el navegador aixafi les imatges per encabir-les */
            box-sizing: border-box;
        }
        
        .item-enllac img { 
            width: 100%; 
            height: 125px;         
            object-fit: cover; 
            border: none; 
            margin-bottom: 8px; 
            cursor: pointer; 
        }
        
        .item-enllac a { 
            color: #000000; 
            text-decoration: none; 
            line-height: 1.3; 
            word-wrap: break-word;
            width: 100%;
        }
        
        .item-enllac a:hover { 
            text-decoration: underline; 
        }

        /* Estilització de la barra d'scroll horitzontal inferior */
        .contenidor-principal::-webkit-scrollbar {
            height: 6px; /* Alçada de la barra horitzontal */
        }
        .contenidor-principal::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .contenidor-principal::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        .contenidor-principal::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Ajust lleuger per a mòbils (només fem les targetes un pèl més compactes) */
        @media (max-width: 600px) {
            .item-enllac { 
                width: 110px;          
            }
            .item-enllac img { 
                height: 110px;         
            }
        }
    </style>
</head>
<body>

    <div class="contenidor-principal">
        <div class="grelha-enllacos" id="contenidorEnllacos">Carregant projectes...</div>
    </div>

    <script>
        // =========================================================================
        //  PEGA AQUÍ EL TEU ENLLAÇ CSV DEL GOOGLE SHEETS
        // =========================================================================
        const URL_CSV_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRw8f4wmgIUeI9A5893zHJXTr7zrZMWNRFKW6ydFbKnuax2gL5QbOs9_S_iyJ07zC-7FqvLYQn1nIuT/pub?gid=468442670&single=true&output=csv";
        
        const BASE_URL_DRIVE = "https://lh3.googleusercontent.com/d/";
        const contenidor = document.getElementById('contenidorEnllacos');

        let urlPaginaActual = "";
        try { urlPaginaActual = decodeURIComponent(document.referrer).toLowerCase(); } catch(e) { urlPaginaActual = document.referrer.toLowerCase(); }

        fetch(URL_CSV_SHEETS)
            .then(response => response.text())
            .then(text => {
                const llines = text.split("\n");
                contenidor.innerHTML = "";
                
                for (let i = 1; i < llines.length; i++) {
                    if (!llines[i].trim()) continue;
                    const columnes = llines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columnes[0] && columnes[2]) {
                        const txt = columnes[0].replace(/"/g, "").trim();
                        const url = columnes[1] ? columnes[1].replace(/"/g, "").trim() : "";
                        const idDrive = columnes[2].replace(/"/g, "").trim();

                        if (url && urlPaginaActual.includes(url.toLowerCase().trim())) continue;

                        const divItem = document.createElement('div');
                        divItem.className = 'item-enllac';

                        const aImg = document.createElement('a');
                        aImg.href = url;
                        aImg.target = "_blank";
                        aImg.rel = "noopener noreferrer";
                        const img = document.createElement('img');
                        img.src = BASE_URL_DRIVE + idDrive;
                        aImg.appendChild(img);

                        const aTxt = document.createElement('a');
                        aTxt.href = url;
                        aTxt.target = "_blank";
                        aTxt.rel = "noopener noreferrer";
                        aTxt.textContent = txt;

                        divItem.appendChild(aImg);
                        divItem.appendChild(aTxt);
                        contenidor.appendChild(divItem);
                    }
                }
            })
            .catch(err => { contenidor.innerHTML = "Error de connexió."; });
    </script>
</body>
</html>
