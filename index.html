<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Galeria Fluida</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #FFFFFF; 
            color: #000000; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 11px; 
            margin: 0; 
            padding: 10px; 
            /* Evitem que apareguin barres de desplaçament dobles molt lletges */
            overflow: hidden; 
        }
        
        /* CONTENIDOR FLEXIBLE: Els elements flueixen com paraules */
        .grelha-enllacos { 
            display: flex;
            flex-wrap: wrap;       /* Activa el salt de línia automàtic quan no hi ha lloc */
            justify-content: center; /* Centra els projectes a la pantalla */
            gap: 20px;             /* Espai de separació constant entre blocs */
            width: 100%; 
            box-sizing: border-box; 
        }
        
        /* CADA ELEMENT INDIVIDUAL (Targeta fixa de mida fixa) */
        .item-enllac { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 130px;          /* Mida constant i perfecta tant per PC com per Mòbil */
            box-sizing: border-box;
        }
        
        .item-enllac img { 
            width: 100%; 
            height: 130px;         /* Forcem que siguin perfectament quadrades */
            object-fit: cover; 
            border: none; 
            margin-bottom: 8px; 
            cursor: pointer; 
        }
        
        .item-enllac a { 
            color: #000000; 
            text-decoration: none; 
            line-height: 1.3; 
            word-wrap: break-word;
            width: 100%;
        }
        
        .item-enllac a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div class="grelha-enllacos" id="contenidorEnllacos">Carregant projectes...</div>

    <script>
        // =========================================================================
        //  PEGA AQUÍ EL TEU ENLLAÇ CSV DEL GOOGLE SHEETS
        // =========================================================================
        const URL_CSV_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRw8f4wmgIUeI9A5893zHJXTr7zrZMWNRFKW6ydFbKnuax2gL5QbOs9_S_iyJ07zC-7FqvLYQn1nIuT/pub?gid=468442670&single=true&output=csv";
        
        const BASE_URL_DRIVE = "https://lh3.googleusercontent.com/d/";
        const contenidor = document.getElementById('contenidorEnllacos');

        let urlPaginaActual = "";
        try { urlPaginaActual = decodeURIComponent(document.referrer).toLowerCase(); } catch(e) { urlPaginaActual = document.referrer.toLowerCase(); }

        fetch(URL_CSV_SHEETS)
            .then(response => response.text())
            .then(text => {
                const llines = text.split("\n");
                contenidor.innerHTML = "";
                
                for (let i = 1; i < llines.length; i++) {
                    if (!llines[i].trim()) continue;
                    const columnes = llines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columnes[0] && columnes[2]) {
                        const txt = columnes[0].replace(/"/g, "").trim();
                        const url = columnes[1] ? columnes[1].replace(/"/g, "").trim() : "";
                        const idDrive = columnes[2].replace(/"/g, "").trim();

                        if (url && urlPaginaActual.includes(url.toLowerCase().trim())) continue;

                        const divItem = document.createElement('div');
                        divItem.className = 'item-enllac';

                        // Enllaç imatge
                        const aImg = document.createElement('a');
                        aImg.href = url;
                        aImg.target = "_blank";
                        aImg.rel = "noopener noreferrer";
                        const img = document.createElement('img');
                        img.src = BASE_URL_DRIVE + idDrive;
                        aImg.appendChild(img);

                        // Enllaç text
                        const aTxt = document.createElement('a');
                        aTxt.href = url;
                        aTxt.target = "_blank";
                        aTxt.rel = "noopener noreferrer";
                        aTxt.textContent = txt;

                        divItem.appendChild(aImg);
                        divItem.appendChild(aTxt);
                        contenidor.appendChild(divItem);
                    }
                }
                
                // CRUCIAL: Un cop pintats els elements, enviem l'alçada automàtica a Google Sites
                enviarAlcadaAGoogleSites();
            })
            .catch(err => { contenidor.innerHTML = "Error de connexió."; });

        // Escolta quan la finestra canvia de mida (per exemple al girar el mòbil) per recalcular l'alçada
        window.addEventListener('resize', enviarAlcadaAGoogleSites);

        function enviarAlcadaAGoogleSites() {
            // Calculem exactament quants píxels ocupa el contingut de la pàgina
            const alcadaReal = document.body.scrollHeight;
            // Enviem un missatge a la finestra mare (Google Sites) amb la nova mida
            window.parent.postMessage({
                sentinel: 'amp',
                type: 'embed-size',
                height: alcadaReal
            }, '*');
        }
    </script>
</body>
</html>
