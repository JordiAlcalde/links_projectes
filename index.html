<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Galeria Scrollable</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            background-color: #FFFFFF; 
            color: #000000; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 11px; 
            margin: 0; 
            padding: 0; /* Eliminem el padding fix per guanyar precisió */
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            
            /* LA MÀGIA PER AL PC: Centrem tot el bloc verticalment dins de la capsa de Google Sites */
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        /* CONTENIDOR PRINCIPAL: Ocupa tota l'amplada i es flexibilitza */
        .contenidor-principal {
            width: 100%;
            max-height: 100%; /* Evita desbordaments */
            overflow-x: auto; 
            overflow-y: hidden; 
            padding-bottom: 8px; /* Espai just per a la barra d'scroll */
            display: flex;
            align-items: center;
        }
        
        /* LA GRAELLA: En línia contínua */
        .grelha-enllacos { 
            display: flex;
            flex-direction: row;  
            flex-wrap: nowrap;     
            gap: 24px; /* Una mica més d'espai elegant entre projectes al PC */
            padding-left: 15px;
            padding-right: 15px;
            margin: 0 auto; /* Centra la fila si hi ha pocs elements */
        }
        
        /* CADA ELEMENT INDIVIDUAL */
        .item-enllac { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            width: 125px;          
            flex-shrink: 0; 
            box-sizing: border-box;
        }
        
        .item-enllac img { 
            width: 100%; 
            height: 125px;         
            object-fit: cover; 
            border: none; 
            margin-bottom: 8px; 
            cursor: pointer; 
            transition: transform 0.2s ease;
        }

        .item-enllac img:hover {
            transform: scale(1.03); /* Un lleuger efecte al PC en passar el ratolí */
        }
        
        .item-enllac a { 
            color: #000000; 
            text-decoration: none; 
            line-height: 1.3; 
            word-wrap: break-word;
            width: 100%;
        }
        
        .item-enllac a:hover { 
            text-decoration: underline; 
        }

        /* Barra d'scroll elegant */
        .contenidor-principal::-webkit-scrollbar {
            height: 5px;
        }
        .contenidor-principal::-webkit-scrollbar-track {
            background: transparent; /* Més net, sense fons gris */
        }
        .contenidor-principal::-webkit-scrollbar-thumb {
            background: #dbdbdb;
            border-radius: 10px;
        }
        .contenidor-principal::-webkit-scrollbar-thumb:hover {
            background: #b5b5b5;
        }

        /* DISSENY OPTIMITZAT PER A MÒBILS */
        @media (max-width: 600px) {
            html, body {
                align-items: flex-start; /* Al mòbil iniciem a dalt de tot per aprofitar l'espai */
                padding-top: 5px;
            }
            .grelha-enllacos {
                gap: 14px;
                margin: 0; /* Al mòbil alineem a l'esquerra per al lliscament */
            }
            .item-enllac { 
                width: 108px;          
            }
            .item-enllac img { 
                height: 108px;         
            }
        }
    </style>
</head>
<body>

    <div class="contenidor-principal">
        <div class="grelha-enllacos" id="contenidorEnllacos">Carregant projectes...</div>
    </div>

    <script>
        // =========================================================================
        //  PEGA AQUÍ EL TEU ENLLAÇ CSV DEL GOOGLE SHEETS
        // =========================================================================
        const URL_CSV_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRw8f4wmgIUeI9A5893zHJXTr7zrZMWNRFKW6ydFbKnuax2gL5QbOs9_S_iyJ07zC-7FqvLYQn1nIuT/pub?gid=468442670&single=true&output=csv";
        
        const BASE_URL_DRIVE = "https://lh3.googleusercontent.com/d/";
        const contenidor = document.getElementById('contenidorEnllacos');

        let urlPaginaActual = "";
        try { urlPaginaActual = decodeURIComponent(document.referrer).toLowerCase(); } catch(e) { urlPaginaActual = document.referrer.toLowerCase(); }

        fetch(URL_CSV_SHEETS)
            .then(response => response.text())
            .then(text => {
                const llines = text.split("\n");
                contenidor.innerHTML = "";
                
                for (let i = 1; i < llines.length; i++) {
                    if (!llines[i].trim()) continue;
                    const columnes = llines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columnes[0] && columnes[2]) {
                        const txt = columnes[0].replace(/"/g, "").trim();
                        const url = columnes[1] ? columnes[1].replace(/"/g, "").trim() : "";
                        const idDrive = columnes[2].replace(/"/g, "").trim();

                        if (url && urlPaginaActual.includes(url.toLowerCase().trim())) continue;

                        const divItem = document.createElement('div');
                        divItem.className = 'item-enllac';

                        const aImg = document.createElement('a');
                        aImg.href = url;
                        aImg.target = "_blank";
                        aImg.rel = "noopener noreferrer";
                        const img = document.createElement('img');
                        img.src = BASE_URL_DRIVE + idDrive;
                        aImg.appendChild(img);

                        const aTxt = document.createElement('a');
                        aTxt.href = url;
                        aTxt.target = "_blank";
                        aTxt.rel = "noopener noreferrer";
                        aTxt.textContent = txt;

                        divItem.appendChild(aImg);
                        divItem.appendChild(aTxt);
                        contenidor.appendChild(divItem);
                    }
                }
            })
            .catch(err => { contenidor.innerHTML = "Error de connexió."; });
    </script>
</body>
</html>
